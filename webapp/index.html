<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Добавить расход</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 20px;
    }
    h2 { font-size: 20px; margin-bottom: 20px; }
    label { font-size: 13px; color: #888; display: block; margin-bottom: 4px; margin-top: 14px; }
    select, input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
    }
    #name-group { display: none; }
    button {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    .error { color: red; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h2>Добавить расход</h2>

  <label>Категория</label>
  <select id="category" onchange="onCategoryChange()">
    <option value="">— выберите —</option>
    <option value="printer">🖨️ Принтер</option>
    <option value="filament">🧵 Пластик (филамент)</option>
    <option value="spare">🔧 Запчасти / расходники</option>
    <option value="other">📦 Другое</option>
  </select>

  <div id="name-group">
    <label>Название / описание</label>
    <input type="text" id="name" placeholder="например: Bambu Lab A1, PLA белый 1кг..." />
  </div>

  <label>Количество</label>
  <input type="number" id="quantity" min="0.01" step="0.01" placeholder="1" />

  <label>Цена за единицу (руб.)</label>
  <input type="number" id="price" min="0.01" step="0.01" placeholder="1500" />

  <div class="error" id="error">Пожалуйста, заполните все поля</div>

  <button onclick="submit()">💾 Сохранить</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function onCategoryChange() {
      const cat = document.getElementById('category').value;
      document.getElementById('name-group').style.display = cat ? 'block' : 'none';
    }

    function submit() {
      const category = document.getElementById('category').value;
      const name = document.getElementById('name').value.trim();
      const quantity = parseFloat(document.getElementById('quantity').value);
      const price = parseFloat(document.getElementById('price').value);
      const err = document.getElementById('error');

      alert(`category: ${category}, name: ${name}, qty: ${quantity}, price: ${price}`);

      if (!category || !name || isNaN(quantity) || isNaN(price) || quantity <= 0 || price <= 0) {
        err.style.display = 'block';
        return;
      }
      err.style.display = 'none';

      tg.sendData(JSON.stringify({ category, name, quantity, price }));
    }
  </script>
</body>
</html>
